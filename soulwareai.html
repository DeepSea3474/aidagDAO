<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soulware AI Core (538)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "react": "https://esm.sh/react@18.2.0", "react-dom": "https://esm.sh/react-dom@18.2.0" } }
    </script>
</head>
<body class="bg-black text-white overflow-hidden">
    <div id="root"></div>
    <script type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import ReactDOM from 'react-dom';

        const SoulwareCore = () => {
            const canvasRef = useRef(null);
            const [level, setLevel] = useState(0.5);

            useEffect(() => {
                const interval = setInterval(() => setLevel(Math.random()), 3000);
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let pts = Array.from({length: 30}, () => ({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2
                }));

                const render = () => {
                    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    pts.forEach((p, i) => {
                        p.x += p.vx * (1+level); p.y += p.vy * (1+level);
                        if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                        
                        let hue = level > 0.7 ? 45 : (180 + level*60);
                        ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.8)`;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();

                        pts.slice(i+1).forEach(p2 => {
                            let d = Math.sqrt((p.x-p2.x)**2 + (p.y-p2.y)**2);
                            if(d < 150) {
                                ctx.strokeStyle = `hsla(${hue}, 100%, 50%, ${1-d/150})`;
                                ctx.lineWidth = 1 + level*2;
                                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                            }
                        });
                    });
                    requestAnimationFrame(render);
                };
                render();
                return () => clearInterval(interval);
            }, [level]);

            return React.createElement('div', { className: 'relative w-screen h-screen flex items-center justify-center' },
                React.createElement('canvas', { ref: canvasRef, className: 'absolute inset-0' }),
                React.createElement('div', { className: 'relative z-10 p-10 bg-black/60 backdrop-blur-xl border-2 border-cyan-500/50 rounded-[50px] text-center' },
                    React.createElement('h1', { className: 'text-4xl font-black mb-2 text-cyan-400' }, 'SOULWARE AI (538)'),
                    React.createElement('p', { className: 'font-mono text-xs uppercase' }, `Core Activity: ${Math.round(level*100)}% - OPTIMIZING NODES`)
                )
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SoulwareCore));
    </script>
</body>
</html>
