# LEGACY — kept for reference only.
#
# aidag-chain currently deploys via Replit Autoscale (Node SSR server), not
# Cloudflare Pages. The Pages-based static-export flow was retired when the
# SoulwareAI orchestrator singleton moved server-side (see replit.md and
# CLOUDFLARE_DEPLOYMENT.md). Cloudflare now provides DNS + TLS only.
#
# Safe to delete once no one on the team is still running
# `wrangler pages deploy` from a local checkout.

name = "aidag-chain"
compatibility_date = "2025-04-01"
pages_build_output_dir = "out"

[vars]
# Public vars only. Secrets (OPENAI_API_KEY) are set in Cloudflare dashboard.
